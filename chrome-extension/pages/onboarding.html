<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DCF Chrome 首次启用</title><link rel="stylesheet" href="common.css"></head><body><main class="page"><section class="hero"><h1>DCF Chrome</h1><p>一个 Chrome 扩展承载语言弹药闭环。无需本机 Runtime、Node.js 或常驻服务。</p></section><section class="card"><h2>首次启用</h2><div id="permission" class="status">正在检查 Chrome 用户脚本权限</div><ol class="steps"><li>点击下面的“打开扩展设置”。</li><li>在 DCF Chrome 详情页开启“允许用户脚本”。</li><li>回到本页点击“启用 DCF”。</li></ol><div class="actions"><button id="open-settings">打开扩展设置</button><button id="activate" class="primary">启用 DCF</button><button id="open-chatgpt">打开 ChatGPT</button><button id="recovery">恢复与诊断</button></div><div id="notice" class="notice muted"></div></section><section class="grid"><article class="card"><h3>旧版数据迁移</h3><div id="migration" class="status">等待检查</div><p class="muted">旧 Tampermonkey 版仍在页面运行时，扩展会自动读取开放侧栏中的弹药、发射模式和外观设置；不会逐条复制，也不会改写旧数据。</p></article><article class="card"><h3>当前代码组合</h3><div id="snapshot" class="muted">尚未读取</div></article></section></main><script src="onboarding.js"></script></body></html>
