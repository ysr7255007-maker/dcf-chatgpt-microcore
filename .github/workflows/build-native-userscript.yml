name: Build native Tampermonkey userscript

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-native-userscript.yml"
      - "engine/**"

permissions:
  contents: write

jobs:
  build-native-userscript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Rebuild single-file userscript
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          import json
          import re

          version = "0.8.0"
          manifest = json.loads(Path("engine/0.7.1/manifest.json").read_text(encoding="utf-8"))
          encoded_parts = []
          for url in manifest["chunks"]:
              if "@main/" in url:
                  rel = url.split("@main/", 1)[1]
              elif "/main/" in url:
                  rel = url.split("/main/", 1)[1]
              else:
                  raise RuntimeError(f"Cannot map chunk URL to repository path: {url}")
              encoded_parts.append(Path(rel).read_text(encoding="utf-8").strip())

          source = base64.b64decode("".join(encoded_parts)).decode("utf-8")
          metadata = f"""// ==UserScript==
// @name         DCF ChatGPT Microcore
// @namespace    https://chatgpt.com/
// @version      {version}
// @description  DCF single-file native Tampermonkey release. No remote eval.
// @updateURL    https://raw.githubusercontent.com/ysr7255007-maker/dcf-chatgpt-microcore/main/dcf-chatgpt-microcore.meta.js
// @downloadURL  https://raw.githubusercontent.com/ysr7255007-maker/dcf-chatgpt-microcore/main/dcf-chatgpt-microcore.user.js
// @supportURL   https://github.com/ysr7255007-maker/dcf-chatgpt-microcore
// @match        https://chatgpt.com/*
// @match        https://chat.openai.com/*
// @grant        GM_setClipboard
// @run-at       document-idle
// ==/UserScript=="""

          source = re.sub(r"// ==UserScript==[\s\S]*?// ==/UserScript==", metadata, source, count=1)
          source = source.replace(
              "  if (!window[LOCAL_ENGINE_BOOT_FLAG] && bootLocalEngine()) return;",
              "  // Native GitHub release: disable legacy local-engine auto boot.\n"
              "  // The authoritative release source is this Tampermonkey-updated .user.js file."
          )

          Path("dcf-chatgpt-microcore.user.js").write_text(source, encoding="utf-8")
          Path("dcf-chatgpt-microcore.meta.js").write_text(metadata + "\n", encoding="utf-8")
          PY

      - name: Commit generated userscript
        shell: bash
        run: |
          if git diff --quiet -- dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js
          git commit -m "Release DCF native userscript 0.8.0"
          git push
