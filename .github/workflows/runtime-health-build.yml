name: DCF Runtime Health Build

on:
  push:
    branches:
      - fix/collapse-not-hide

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/collapse-not-hide
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit generated release artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog/index.json catalog/packages
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Generate 0.11.4 release artifacts'
          git push origin HEAD:fix/collapse-not-hide
