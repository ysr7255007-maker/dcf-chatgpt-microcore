name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize-compact-dialogue:
    if: github.event_name == 'pull_request' && github.head_ref == 'work/dialogue-compact-result-action-20260719'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Update workspace dialogue version baseline
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/chrome-workspace-ui.test.js')
          text = path.read_text()
          old = "assert.strictEqual(versions['dcf.firstparty.local-agent-dialogue'], '1.0.0-rc.2-local-agent-dialogue.9');"
          new = "assert.strictEqual(versions['dcf.firstparty.local-agent-dialogue'], '1.0.0-rc.2-local-agent-dialogue.10');"
          if old not in text:
              raise SystemExit('workspace dialogue version baseline not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Install dependencies
        run: npm ci
      - name: Verify Chrome candidate
        run: npm run verify:chrome
      - name: Commit verified baseline
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin rebuild/chrome-native-host-v2
          git checkout origin/rebuild/chrome-native-host-v2 -- .github/workflows/verify.yml
          git add tests/chrome-workspace-ui.test.js .github/workflows/verify.yml
          git diff --cached --check
          git commit -m 'test: align dialogue workspace version'
          git push origin HEAD:${{ github.head_ref }}

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run repository verification
        id: verify
        shell: bash
        run: |
          set +e
          npm run verify 2>&1 | tee verify.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcf-verify-log-${{ github.run_id }}
          path: verify.log
          if-no-files-found: error
      - run: node --check dcf-chatgpt-microcore.user.js
