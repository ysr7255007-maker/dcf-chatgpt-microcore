name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main
      - feature/conversation-performance-governor

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/conversation-performance-governor
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python scripts/fix-performance-health-gating.py
      - name: Commit health gating fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/modules/health.js tests/dcf-health-report.unit.test.js tests/dcf-conversation-performance.unit.test.js
          git diff --cached --quiet || git commit -m 'Gate performance health on the active package'
          git push origin HEAD:feature/conversation-performance-governor
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
