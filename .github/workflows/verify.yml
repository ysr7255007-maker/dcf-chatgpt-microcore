name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main
      - feature/conversation-turn-attribution

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/conversation-turn-attribution
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python scripts/fix-conversation-turn-attribution-audit.py
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit audited implementation and generated artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests docs dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog
          git diff --cached --quiet || git commit -m 'Clarify automatic turn completion and manual recovery'
          git push origin HEAD:feature/conversation-turn-attribution
