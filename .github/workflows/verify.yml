name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-compact-dialogue:
    if: github.event_name == 'pull_request' && github.head_ref == 'work/dialogue-compact-result-action-20260719'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Apply compact dialogue patch and ADR
        run: python3 .github/scripts/compact-dialogue-patch.py
      - name: Install dependencies
        run: npm ci
      - name: Build Chrome index
        run: |
          node --check chrome-extension/code-units/local-agent-dialogue/main.js
          npm run build:chrome
      - name: Run compact dialogue test
        run: node tests/chrome-local-agent-dialogue.test.js
      - name: Run full Chrome verification
        run: npm run verify:chrome
      - name: Commit verified result
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin rebuild/chrome-native-host-v2
          git checkout origin/rebuild/chrome-native-host-v2 -- .github/workflows/verify.yml
          git rm .github/workflows/one-shot-dialogue-compact-result.yml .github/scripts/compact-dialogue-patch.py
          git add chrome-extension/code-units/local-agent-dialogue/main.js \
            tests/chrome-local-agent-dialogue.test.js \
            releases/chrome/official-index.json \
            docs/adr/2026-07-19-dcf-dialogue-compact-result-boundary.md \
            docs/adr/status-index.md \
            docs/current-state.md \
            .github/workflows/verify.yml
          git diff --cached --check
          git commit -m 'fix: keep dialogue results compact'
          git push origin HEAD:${{ github.head_ref }}

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run repository verification
        id: verify
        shell: bash
        run: |
          set +e
          npm run verify 2>&1 | tee verify.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcf-verify-log-${{ github.run_id }}
          path: verify.log
          if-no-files-found: error
      - run: node --check dcf-chatgpt-microcore.user.js
