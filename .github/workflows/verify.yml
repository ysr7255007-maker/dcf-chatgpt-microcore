name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main
      - feature/conversation-turn-attribution

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/conversation-turn-attribution
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run and capture integration
        run: |
          set +e
          python scripts/apply-conversation-turn-attribution.py > turn-attribution-integration.log 2>&1
          status=$?
          cat turn-attribution-integration.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add turn-attribution-integration.log
          git commit -m 'Capture turn attribution integration failure' || true
          git push origin HEAD:feature/conversation-turn-attribution
          exit $status
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
