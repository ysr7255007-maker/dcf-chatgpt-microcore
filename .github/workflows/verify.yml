name: DCF Package UI Build

on:
  push:
    branches:
      - fix/package-management-compact-ui

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/package-management-compact-ui
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python scripts/apply-package-ui-patch.py
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit verified source and release
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git checkout origin/main -- .github/workflows/verify.yml
          git rm -f scripts/apply-package-ui-patch.py .github/workflows/package-ui-build.yml .package-ui-trigger
          git add src/modules/package-manager.js src/ui/app.js src/core/constants.js tests/dcf-package-management-ui.unit.test.js package.json README.md docs/architecture-current.md docs/current-state.md dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog/index.json catalog/packages .github/workflows/verify.yml
          git commit -m 'Localize and compact package management UI for 0.11.6'
          git push origin HEAD:fix/package-management-compact-ui
