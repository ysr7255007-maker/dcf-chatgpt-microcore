name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main
      - feature/conversation-turn-attribution

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/conversation-turn-attribution
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Repair indentation-sensitive integration targets
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-conversation-turn-attribution.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('"       if (typeof onReplyComplete === \'function\') onReplyComplete({ node, text, source, completed_at: nowIso() });"', '"if (typeof onReplyComplete === \'function\') onReplyComplete({ node, text, source, completed_at: nowIso() });"')
          text = text.replace('"       if (typeof onReplyComplete === \'function\') onReplyComplete({ node, text, source, completed_at: nowIso(), at_epoch_ms: Date.now(), quiet_ms: quietMs });"', '"if (typeof onReplyComplete === \'function\') onReplyComplete({ node, text, source, completed_at: nowIso(), at_epoch_ms: Date.now(), quiet_ms: quietMs });"')
          text = text.replace('"       startReplyObserver(callback);"', '"startReplyObserver(callback);"')
          text = text.replace('"       startReplyObserver(callback, observerOptions);"', '"startReplyObserver(callback, observerOptions);"')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Run and capture integration
        run: |
          set +e
          python scripts/apply-conversation-turn-attribution.py > turn-attribution-integration.log 2>&1
          status=$?
          cat turn-attribution-integration.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add turn-attribution-integration.log
          git commit -m 'Capture remaining turn attribution integration failure' || true
          git push origin HEAD:feature/conversation-turn-attribution
          exit $status
