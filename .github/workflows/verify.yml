name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main
      - feature/conversation-turn-attribution

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/conversation-turn-attribution
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Repair indentation-sensitive integration targets
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-conversation-turn-attribution.py')
          text = path.read_text(encoding='utf-8')
          pairs = [
            ('"       if (typeof onReplyComplete === \'function\') onReplyComplete({ node, text, source, completed_at: nowIso() });"', '"if (typeof onReplyComplete === \'function\') onReplyComplete({ node, text, source, completed_at: nowIso() });"'),
            ('"       if (typeof onReplyComplete === \'function\') onReplyComplete({ node, text, source, completed_at: nowIso(), at_epoch_ms: Date.now(), quiet_ms: quietMs });"', '"if (typeof onReplyComplete === \'function\') onReplyComplete({ node, text, source, completed_at: nowIso(), at_epoch_ms: Date.now(), quiet_ms: quietMs });"'),
            ('"       startReplyObserver(callback);"', '"startReplyObserver(callback);"'),
            ('"       startReplyObserver(callback, observerOptions);"', '"startReplyObserver(callback, observerOptions);"'),
            ('"       url_watch_active: !!urlTimer"', '"url_watch_active: !!urlTimer"'),
            ('"       url_watch_active: !!urlTimer,\\n       send_observer_attached: !!(sendClickHandler && sendKeyHandler)"', '"url_watch_active: !!urlTimer,\\n      send_observer_attached: !!(sendClickHandler && sendKeyHandler)"')
          ]
          for old, new in pairs:
            text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply turn attribution upgrade
        run: python scripts/apply-conversation-turn-attribution.py
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit implementation and generated release artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -f turn-attribution-integration.log || true
          git add README.md package.json scripts/build-userscript.js scripts/apply-conversation-turn-attribution.py src tests docs dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog
          git diff --cached --quiet || git commit -m 'Implement conversation-turn performance attribution'
          git push origin HEAD:feature/conversation-turn-attribution
