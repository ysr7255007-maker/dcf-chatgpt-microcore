name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main
      - feature/conversation-performance-governor

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/conversation-performance-governor
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run and capture verification
        run: |
          set +e
          npm run verify > verify-performance.log 2>&1
          status=$?
          cat verify-performance.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add verify-performance.log
          git commit -m 'Capture performance governor verification failure' || true
          git push origin HEAD:feature/conversation-performance-governor
          exit $status
