name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - feature/stateful-command-feedback

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/stateful-command-feedback
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply release and package state contracts
        run: |
          gzip -dc scripts/stateful-step1.py.gz > /tmp/stateful-step1.py
          python /tmp/stateful-step1.py
      - name: Apply UI state renderer and Runtime wiring
        run: |
          gzip -dc scripts/stateful-step2.py.gz > /tmp/stateful-step2.py
          python /tmp/stateful-step2.py
      - name: Apply state feedback documentation
        run: |
          gzip -dc scripts/stateful-step3.py.gz > /tmp/stateful-step3.py
          python /tmp/stateful-step3.py
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit implementation and generated artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md package.json src tests docs dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog
          git diff --cached --quiet || git commit -m 'Add visible state feedback to stateful controls'
          git push origin HEAD:feature/stateful-command-feedback
