name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-model-persistence:
    if: github.event_name == 'pull_request' && github.head_ref == 'work/local-agent-model-persistence-20260719'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Apply canonical saved-model patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          local_path = Path('chrome-extension/code-units/local-agent/main.js')
          local = local_path.read_text()
          local = local.replace(
              "const UNIT_VERSION = '1.0.0-rc.2-local-agent.2';",
              "const UNIT_VERSION = '1.0.0-rc.2-local-agent.3';",
              1,
          )
          normalize_block = '''  function normalizeModel(value) {
            if (!value || typeof value !== 'object') return null;
            const providerID = String(value.providerID || '').trim();
            const modelID = String(value.modelID || '').trim();
            return providerID && modelID ? { providerID, modelID } : null;
          }
'''
          helpers_block = normalize_block + '''
          function modelKey(value) {
            const model = normalizeModel(value);
            return model ? `${model.providerID}\\u0000${model.modelID}` : '';
          }

          function modelOptionsForRender(models, savedModel) {
            const options = Array.isArray(models) ? [...models] : [];
            const saved = normalizeModel(savedModel);
            if (!saved) return options;
            const savedKey = modelKey(saved);
            if (options.some((item) => modelKey(item) === savedKey)) return options;
            return [{ ...saved, label: `已保存 · ${saved.providerID} / ${saved.modelID}`, persisted_only: true }, ...options];
          }
'''
          if normalize_block not in local:
              raise SystemExit('normalizeModel block not found')
          local = local.replace(normalize_block, helpers_block, 1)
          render_old = '''    const agents = agentOptions();
              const models = modelOptions();
              const currentModel = state.config.model ? `${state.config.model.providerID}\\u0000${state.config.model.modelID}` : '';
'''
          render_new = '''    const agents = agentOptions();
              const models = modelOptionsForRender(modelOptions(), state.config.model);
              const currentModel = modelKey(state.config.model);
'''
          if render_old not in local:
              raise SystemExit('local render model block not found')
          local = local.replace(render_old, render_new, 1)
          local_path.write_text(local)

          dialogue_path = Path('chrome-extension/code-units/local-agent-dialogue/main.js')
          dialogue = dialogue_path.read_text()
          dialogue = dialogue.replace(
              "const UNIT_VERSION = '1.0.0-rc.2-local-agent-dialogue.10';",
              "const UNIT_VERSION = '1.0.0-rc.2-local-agent-dialogue.11';",
              1,
          )
          connection_old = '''  async function connectionConfig() {
            const result = await host({ type: 'plugin.data.get', plugin_id: LOCAL_AGENT_ID });
            const data = result.data && typeof result.data === 'object' ? result.data : {};
            const stored = data.config && typeof data.config === 'object' ? data.config : {};
            const shadow = localAgentShadow();
            const modelValue = String(shadow?.querySelector('[data-field="model"]')?.value || '');
            const modelParts = modelValue ? modelValue.split('\\u0000') : [];
            return {
              base_url: String(shadow?.querySelector('[data-field="base-url"]')?.value || stored.base_url || 'http://127.0.0.1:4096').trim(),
              username: String(shadow?.querySelector('[data-field="username"]')?.value || stored.username || 'opencode').trim() || 'opencode',
              password: String(shadow?.querySelector('[data-field="password"]')?.value || ''),
              agent: String(shadow?.querySelector('[data-field="agent"]')?.value || stored.agent || ''),
              model: modelParts.length === 2 ? { providerID: modelParts[0], modelID: modelParts[1] } : stored.model || null
            };
          }
'''
          connection_new = '''  function normalizeStoredModel(value) {
            if (!value || typeof value !== 'object') return null;
            const providerID = String(value.providerID || '').trim();
            const modelID = String(value.modelID || '').trim();
            return providerID && modelID ? { providerID, modelID } : null;
          }

          async function connectionConfig() {
            const result = await host({ type: 'plugin.data.get', plugin_id: LOCAL_AGENT_ID });
            const data = result.data && typeof result.data === 'object' ? result.data : {};
            const stored = data.config && typeof data.config === 'object' ? data.config : {};
            const shadow = localAgentShadow();
            return {
              base_url: String(shadow?.querySelector('[data-field="base-url"]')?.value || stored.base_url || 'http://127.0.0.1:4096').trim(),
              username: String(shadow?.querySelector('[data-field="username"]')?.value || stored.username || 'opencode').trim() || 'opencode',
              password: String(shadow?.querySelector('[data-field="password"]')?.value || ''),
              agent: String(shadow?.querySelector('[data-field="agent"]')?.value || stored.agent || ''),
              model: normalizeStoredModel(stored.model)
            };
          }
'''
          if connection_old not in dialogue:
              raise SystemExit('dialogue connectionConfig block not found')
          dialogue = dialogue.replace(connection_old, connection_new, 1)
          dialogue_path.write_text(dialogue)

          status_path = Path('tests/chrome-local-agent-status.test.js')
          status = status_path.read_text()
          status = status.replace(
              "assert.strictEqual(ref.version, '1.0.0-rc.2-local-agent.2');",
              "assert.strictEqual(ref.version, '1.0.0-rc.2-local-agent.3');",
              1,
          )
          token_point = "  'function statusCollection(value)',\n"
          token_insert = "  'function modelKey(value)',\n  'function modelOptionsForRender(models, savedModel)',\n  'modelOptionsForRender(modelOptions(), state.config.model)',\n  'const currentModel = modelKey(state.config.model)',\n  'function statusCollection(value)',\n"
          if token_point not in status:
              raise SystemExit('local status token point not found')
          status = status.replace(token_point, token_insert, 1)
          behavior = r'''
          const helperStart = code.indexOf('function normalizeModel(value)');
          const helperEnd = code.indexOf('function normalizeBaseUrl', helperStart);
          assert(helperStart >= 0 && helperEnd > helperStart);
          const helperFactory = new Function(`${code.slice(helperStart, helperEnd)}\nreturn { normalizeModel, modelKey, modelOptionsForRender };`);
          const helpers = helperFactory();
          const saved = { providerID: 'deepseek', modelID: 'deepseek-v4-flash' };
          const restored = helpers.modelOptionsForRender([], saved);
          assert.strictEqual(restored.length, 1);
          assert.strictEqual(restored[0].providerID, saved.providerID);
          assert.strictEqual(restored[0].modelID, saved.modelID);
          assert.strictEqual(helpers.modelKey(restored[0]), 'deepseek\u0000deepseek-v4-flash');
          const existing = helpers.modelOptionsForRender([{ ...saved, label: 'DeepSeek V4 Flash' }], saved);
          assert.strictEqual(existing.length, 1);
          '''
          console_point = "console.log(JSON.stringify({\n"
          if console_point not in status:
              raise SystemExit('local status console point not found')
          status = status.replace(console_point, behavior + "\n" + console_point, 1)
          status = status.replace(
              "  localized_status_display: true\n",
              "  localized_status_display: true,\n  saved_model_survives_missing_catalog: true,\n  explicit_default_is_only_clear_path: true\n",
              1,
          )
          status_path.write_text(status)

          dialogue_test_path = Path('tests/chrome-local-agent-dialogue.test.js')
          dialogue_test = dialogue_test_path.read_text()
          dialogue_test = dialogue_test.replace(
              "assert.strictEqual(ref.version, '1.0.0-rc.2-local-agent-dialogue.10');",
              "assert.strictEqual(ref.version, '1.0.0-rc.2-local-agent-dialogue.11');",
              1,
          )
          dialogue_token = "  'function assistantText(record)',\n"
          dialogue_insert = "  'function normalizeStoredModel(value)',\n  'model: normalizeStoredModel(stored.model)',\n  'function assistantText(record)',\n"
          if dialogue_token not in dialogue_test:
              raise SystemExit('dialogue test token point not found')
          dialogue_test = dialogue_test.replace(dialogue_token, dialogue_insert, 1)
          forbidden_point = "  '/prompt_async',\n"
          forbidden_insert = "  '/prompt_async',\n  'const modelValue = String(shadow?.querySelector',\n  'modelParts.length === 2',\n"
          if forbidden_point not in dialogue_test:
              raise SystemExit('dialogue forbidden point not found')
          dialogue_test = dialogue_test.replace(forbidden_point, forbidden_insert, 1)
          dialogue_test = dialogue_test.replace(
              "  raw_messages_not_returned: true\n",
              "  raw_messages_not_returned: true,\n  persisted_model_is_canonical: true\n",
              1,
          )
          dialogue_test_path.write_text(dialogue_test)

          for path_name in ['tests/chrome-build.integration.test.js', 'tests/chrome-workspace-ui.test.js']:
              path = Path(path_name)
              text = path.read_text()
              text = text.replace('1.0.0-rc.2-local-agent.2', '1.0.0-rc.2-local-agent.3')
              text = text.replace('1.0.0-rc.2-local-agent-dialogue.10', '1.0.0-rc.2-local-agent-dialogue.11')
              path.write_text(text)

          adr_path = Path('docs/adr/2026-07-19-dcf-local-agent-model-persistence.md')
          adr_path.write_text('''# DCF Local Agent model persistence

          Date: 2026-07-19

          Status: accepted; implementation and GitHub Action verification complete; live browser acceptance pending

          ## Context

          The Local Agent plugin persisted `config.model`, but immediately after plugin load the provider catalog was not yet available. The model selector therefore rendered only `OpenCode 默认模型`, even when a concrete model had been restored from plugin storage. Pressing `保存并连接` in that state converted the empty selector value to `null` and overwrote the saved model.

          The dialogue adapter also preferred the current selector value over persisted configuration. An unsaved temporary UI selection could therefore affect automatic dialogue delegation, while manual Local Agent tasks used `state.config.model`. The two interaction paths did not share one authoritative model selection.

          ## Decision

          1. The persisted Local Agent model is the canonical model for all task submission paths.
          2. When the provider catalog is unavailable or no longer lists the saved model, the selector renders a synthetic `已保存` option for that exact provider/model pair and keeps it selected.
          3. `保存并连接` preserves that model. The model is cleared only when the user explicitly selects `OpenCode 默认模型` and saves.
          4. Manual new-session tasks and current-session continuation continue to submit `state.config.model`.
          5. The dialogue adapter reads `stored.model` from plugin storage and does not consume an unsaved model dropdown value.
          6. The page-only password remains read from the live panel because it is intentionally never persisted.

          ## Consequences

          - One saved selection governs Local Agent panel execution, continued sessions and ChatGPT dialogue delegation.
          - Plugin refresh, hot update and temporarily unavailable provider catalogs no longer silently erase the model.
          - A model removed from the current catalog remains visible as a saved fallback until the user explicitly changes it.

          ## Reconsideration conditions

          Reconsider when request-level model overrides are intentionally added to `dcf.local-agent.request.v1`. Such overrides must be explicit per request and must not mutate the saved default model.
          ''')

          status_index = Path('docs/adr/status-index.md')
          index_text = status_index.read_text()
          line = '- `2026-07-19-dcf-local-agent-model-persistence.md` — **accepted; implementation and GitHub Action verification complete; live browser acceptance pending**; one persisted provider/model selection governs manual Local Agent tasks, continued sessions and automatic dialogue delegation\n'
          if line not in index_text:
              index_text = index_text.replace('## Current\n\n', '## Current\n\n' + line, 1)
          status_index.write_text(index_text)

          current_path = Path('docs/current-state.md')
          current = current_path.read_text()
          workbench_line = '- the manual workbench covers connection, agent/model, sessions, tasks, status, messages, todo, diff, abort, permissions, questions, result insertion and diagnostics;\n'
          persistence_line = '- Local Agent `.3` renders the persisted model even before the provider catalog is available, preserves it across hot/page refresh, and clears it only after an explicit saved selection of `OpenCode 默认模型`;\n'
          if persistence_line not in current:
              current = current.replace(workbench_line, workbench_line + persistence_line, 1)
          old_dialogue_line = '- dialogue `.10` keeps raw OpenCode messages internal and returns only the latest Assistant `type: "text"` content as `assistant_result`; automatic result artifacts never include the `messages` collection, including for legacy `return_mode: full`;\n'
          new_dialogue_line = '- dialogue `.11` keeps the compact `.10` result boundary and uses the Local Agent persisted model as the canonical model for automatic delegation rather than reading an unsaved dropdown value;\n'
          if old_dialogue_line in current:
              current = current.replace(old_dialogue_line, new_dialogue_line, 1)
          live_anchor = '- dialogue `.10` compact-result behavior has automated verification; real-browser acceptance of a `return_mode: full` request remains pending;\n'
          live_line = '- Local Agent `.3` and dialogue `.11` model persistence have GitHub Action verification; real-browser persistence and model-identity acceptance remain pending;\n'
          if live_line not in current:
              current = current.replace(live_anchor, live_anchor + live_line, 1)
          current_path.write_text(current)
          PY
      - name: Install dependencies
        run: npm ci
      - name: Verify Chrome model persistence
        run: npm run verify:chrome
      - name: Commit verified implementation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin rebuild/chrome-native-host-v2
          git checkout origin/rebuild/chrome-native-host-v2 -- .github/workflows/verify.yml
          git add chrome-extension/code-units/local-agent/main.js \
            chrome-extension/code-units/local-agent-dialogue/main.js \
            tests/chrome-local-agent-status.test.js \
            tests/chrome-local-agent-dialogue.test.js \
            tests/chrome-build.integration.test.js \
            tests/chrome-workspace-ui.test.js \
            releases/chrome/official-index.json \
            docs/adr/2026-07-19-dcf-local-agent-model-persistence.md \
            docs/adr/status-index.md \
            docs/current-state.md \
            .github/workflows/verify.yml
          git diff --cached --check
          git commit -m 'fix: persist local agent model selection'
          git push origin HEAD:${{ github.head_ref }}

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run repository verification
        id: verify
        shell: bash
        run: |
          set +e
          npm run verify 2>&1 | tee verify.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcf-verify-log-${{ github.run_id }}
          path: verify.log
          if-no-files-found: error
      - run: node --check dcf-chatgpt-microcore.user.js
