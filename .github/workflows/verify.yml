name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run repository verification
        id: verify
        shell: bash
        run: |
          set +e
          npm run verify 2>&1 | tee verify.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcf-verify-log-${{ github.run_id }}
          path: verify.log
          if-no-files-found: error
      - run: node --check dcf-chatgpt-microcore.user.js
