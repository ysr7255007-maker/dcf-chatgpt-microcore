name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-local-agent:
    if: github.event_name == 'pull_request' && github.head_ref == 'work/local-agent-model-return-profiles-20260719'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Apply product and ADR patches
        run: |
          python3 .github/scripts/patch-local-agent-model.py
          python3 .github/scripts/patch-dialogue-profiles.py
          python3 .github/scripts/patch-local-agent-tests.py
          python3 .github/scripts/patch-local-agent-docs.py
      - name: Verify repository
        run: |
          npm ci
          npm run verify
      - name: Commit verified implementation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin rebuild/chrome-native-host-v2
          git checkout origin/rebuild/chrome-native-host-v2 -- .github/workflows/verify.yml
          git rm .github/scripts/patch-local-agent-model.py
          git rm .github/scripts/patch-dialogue-profiles.py
          git rm .github/scripts/patch-local-agent-tests.py
          git rm .github/scripts/patch-local-agent-docs.py
          git add chrome-extension/code-units/local-agent/main.js
          git add chrome-extension/code-units/local-agent-dialogue/main.js
          git add tests/chrome-local-agent-status.test.js
          git add tests/chrome-local-agent-dialogue.test.js
          git add tests/chrome-build.integration.test.js
          git add tests/chrome-workspace-ui.test.js
          git add releases/chrome/official-index.json
          git add docs/adr/2026-07-19-dcf-dialogue-compact-result-boundary.md
          git add docs/adr/2026-07-19-dcf-local-agent-model-persistence.md
          git add docs/adr/status-index.md
          git add docs/current-state.md
          git add .github/workflows/verify.yml
          git diff --cached --check
          git commit -m 'fix: persist model and add bounded dialogue profiles'
          git push origin HEAD:${{ github.head_ref }}

  verify:
    if: github.event_name != 'pull_request' || github.head_ref != 'work/local-agent-model-return-profiles-20260719'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run repository verification
        id: verify
        shell: bash
        run: |
          set +e
          npm run verify 2>&1 | tee verify.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcf-verify-log-${{ github.run_id }}
          path: verify.log
          if-no-files-found: error
      - run: node --check dcf-chatgpt-microcore.user.js
