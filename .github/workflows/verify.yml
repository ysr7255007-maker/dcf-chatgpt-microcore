name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-dialogue-permission-race:
    if: github.event_name == 'pull_request' && github.head_ref == 'work/dialogue-permission-awaiting-race-20260719'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Apply permission identity retention patch
        run: python3 .github/scripts/patch-dialogue-permission-awaiting-race.py
      - name: Verify repository
        run: |
          npm ci --silent
          npm run verify
      - name: Commit verified implementation
        shell: bash
        run: |
          exec > >(tee commit.log) 2>&1
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin rebuild/chrome-native-host-v2
          git checkout origin/rebuild/chrome-native-host-v2 -- .github/workflows/verify.yml
          rm -f .github/scripts/patch-dialogue-permission-awaiting-race.py
          git add -A
          git status --short
          git diff --cached --check
          git commit -m 'fix: retain pending permission identity across polling gaps'
          git push origin HEAD:${{ github.head_ref }}
      - name: Upload commit-step evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dialogue-permission-race-commit-${{ github.run_id }}
          path: commit.log
          if-no-files-found: warn

  verify:
    if: github.event_name != 'pull_request' || github.head_ref != 'work/dialogue-permission-awaiting-race-20260719'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run repository verification
        id: verify
        shell: bash
        run: |
          set +e
          npm run verify 2>&1 | tee verify.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcf-verify-log-${{ github.run_id }}
          path: verify.log
          if-no-files-found: error
      - run: node --check dcf-chatgpt-microcore.user.js
