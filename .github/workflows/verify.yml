name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main
      - feature/conversation-performance-governor

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/conversation-performance-governor
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python scripts/apply-conversation-performance-governor.py
      - name: Commit candidate source before verification
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md package.json src tests docs
          git diff --cached --quiet || git commit -m 'Implement conversation performance governor candidate'
          git push origin HEAD:feature/conversation-performance-governor
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit generated release artifacts
        if: success()
        run: |
          git add dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog
          git diff --cached --quiet || git commit -m 'Generate DCF 0.16.0 release artifacts'
          git push origin HEAD:feature/conversation-performance-governor
