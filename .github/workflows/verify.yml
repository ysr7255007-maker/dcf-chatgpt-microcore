name: DCF Verify

on:
  push:
    branches:
      - feature/stateful-command-feedback

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/stateful-command-feedback
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Capture step one failure
        run: |
          set +e
          gzip -dc scripts/stateful-step1.py.gz > /tmp/stateful-step1.py
          python /tmp/stateful-step1.py > stateful-step1.log 2>&1
          status=$?
          cat stateful-step1.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add stateful-step1.log
          git commit -m 'Capture stateful step one failure' || true
          git push origin HEAD:feature/stateful-command-feedback
          exit $status
