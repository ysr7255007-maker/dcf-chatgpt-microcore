name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/unified-capability-reconciliation
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python scripts/apply-unified-capability-reconciliation.py
      - name: Normalize generated source file starts
        run: |
          python - <<'PY'
          from pathlib import Path
          paths = [
            'src/core/artifacts.js',
            'src/modules/catalog.js',
            'src/runtime/reconciler.js',
            'src/core/projection.js',
            'src/modules/standard-packages.js',
            'src/modules/package-manager.js',
            'src/index.js',
            'tests/dcf-capability-reconciliation.unit.test.js',
            'tests/dcf-declarative-ui-package.unit.test.js',
            'docs/adr/2026-07-13-dcf-unified-capability-reconciliation.md'
          ]
          for name in paths:
            path = Path(name)
            text = path.read_text()
            if text.startswith('\\\n'):
              path.write_text(text[2:])
          PY
      - name: Verify upgraded source
        shell: bash
        run: |
          set +e
          npm run verify > /tmp/dcf-verify.log 2>&1
          status=$?
          tail -n 120 /tmp/dcf-verify.log > .upgrade-failure.log
          exit "$status"
      - name: Publish failure evidence
        if: failure()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .upgrade-failure.log
          git commit -m 'Record unified reconciliation verification failure'
          git push origin HEAD:feature/unified-capability-reconciliation
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit upgraded source and generated release
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .upgrade-failure.log
          git add README.md package.json src scripts/build-userscript.js tests docs catalog dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js .upgrade-failure.log
          git commit -m 'Unify capability reconciliation and package-owned UI'
          git push origin HEAD:feature/unified-capability-reconciliation
