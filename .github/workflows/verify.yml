name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/ammo-invocation-update-protocol
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit generated release artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog/index.json catalog/packages/dcf.standard.ammo/1.2.0.json
          git diff --cached --quiet || git commit -m 'Generate DCF 0.14.0 release artifacts'
          git push origin HEAD:feature/ammo-invocation-update-protocol
