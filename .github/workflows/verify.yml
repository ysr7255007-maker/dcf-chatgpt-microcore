name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main
      - fix/bootstrap-package-auto-sync

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/bootstrap-package-auto-sync
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify and capture result
        run: |
          set +e
          npm run verify > verify-bootstrap-sync.log 2>&1
          status=$?
          node --check dcf-chatgpt-microcore.user.js >> verify-bootstrap-sync.log 2>&1
          syntax_status=$?
          if [ $status -eq 0 ] && [ $syntax_status -eq 0 ]; then
            echo "BOOTSTRAP_SYNC_VERIFY=success" >> verify-bootstrap-sync.log
          else
            echo "BOOTSTRAP_SYNC_VERIFY=failure npm=$status syntax=$syntax_status" >> verify-bootstrap-sync.log
          fi
          cat verify-bootstrap-sync.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add verify-bootstrap-sync.log dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog
          git diff --cached --quiet || git commit -m 'Verify and generate DCF 0.18.1 artifacts'
          git push origin HEAD:fix/bootstrap-package-auto-sync
          if [ $status -ne 0 ] || [ $syntax_status -ne 0 ]; then exit 1; fi
