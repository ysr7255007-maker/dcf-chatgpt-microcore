name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main
      - feature/conversation-performance-governor

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/conversation-performance-governor
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm run build
      - name: Commit bundled release artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog
          git diff --cached --quiet || git commit -m 'Bundle conversation performance controller in DCF 0.16.0'
          git push origin HEAD:feature/conversation-performance-governor
      - run: npm test
      - run: node --check dcf-chatgpt-microcore.user.js
