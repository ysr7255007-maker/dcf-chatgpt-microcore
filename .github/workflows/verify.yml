name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main
      - feature/runtime-performance-attribution

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/runtime-performance-attribution
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python scripts/apply-runtime-performance-attribution-integration.py
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit integration and generated release artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md package.json scripts/build-userscript.js src tests docs dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog
          git diff --cached --quiet || git commit -m 'Integrate Runtime performance attribution and generate DCF 0.17.0'
          git push origin HEAD:feature/runtime-performance-attribution
