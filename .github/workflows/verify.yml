name: DCF Verify

on:
  pull_request:
  push:
    branches:
      - main
      - feature/canonical-module-supersession

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/canonical-module-supersession
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python scripts/fix-supersession-health.py
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit health integration and generated artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json src tests docs dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog
          git diff --cached --quiet || git commit -m 'Make Runtime health aware of canonical module supersession'
          git push origin HEAD:feature/canonical-module-supersession
