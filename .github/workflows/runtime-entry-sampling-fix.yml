name: DCF Runtime Entry Sampling Fix

on:
  push:
    branches:
      - fix/runtime-entry-sampling

permissions:
  contents: write

jobs:
  patch-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/runtime-entry-sampling
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply source and regression-test fix
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('src/ui/app.js')
          text = app.read_text()
          replacements = {
            "collectIds('[data-runtime-section=\"daily\"] [data-module-id]', 'data-module-id')": "collectIds('[data-runtime-section=\"daily\"] > details.module-card[data-module-id]', 'data-module-id')",
            "collectIds('[data-runtime-section=\"daily\"] details[data-module-id]:not([open])', 'data-module-id')": "collectIds('[data-runtime-section=\"daily\"] > details.module-card[data-module-id]:not([open])', 'data-module-id')",
            "collectIds('[data-runtime-section=\"maintenance-tools\"] [data-module-id]', 'data-module-id')": "collectIds('[data-runtime-section=\"maintenance-tools\"] > details.module-card[data-module-id]', 'data-module-id')",
            "collectIds('[data-runtime-section=\"maintenance-tools\"] details[data-module-id]:not([open])', 'data-module-id')": "collectIds('[data-runtime-section=\"maintenance-tools\"] > details.module-card[data-module-id]:not([open])', 'data-module-id')",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing expected selector: {old}')
              text = text.replace(old, new)
          app.write_text(text)

          test = Path('tests/dcf-module-visibility.unit.test.js')
          text = test.read_text()
          anchor = "assert(appSource.includes('data-module-role=\"daily\"'), 'daily/maintenance role controls missing');\n"
          addition = (
            "assert(appSource.includes('[data-runtime-section=\"daily\"] > details.module-card[data-module-id]'), 'daily Runtime sampling is not limited to module entry cards');\n"
            "assert(appSource.includes('[data-runtime-section=\"maintenance-tools\"] > details.module-card[data-module-id]'), 'maintenance Runtime sampling is not limited to module entry cards');\n"
            "assert(!appSource.includes('[data-runtime-section=\"daily\"] [data-module-id]'), 'broad daily selector still counts command buttons as duplicate entries');\n"
            "assert(!appSource.includes('[data-runtime-section=\"maintenance-tools\"] [data-module-id]'), 'broad maintenance selector still counts command buttons as duplicate entries');\n"
          )
          if anchor not in text:
              raise SystemExit('test anchor missing')
          text = text.replace(anchor, anchor + addition)
          test.write_text(text)

          constants = Path('src/core/constants.js')
          text = constants.read_text().replace("const VERSION = '0.11.4';", "const VERSION = '0.11.5';")
          constants.write_text(text)

          package = Path('package.json')
          package.write_text(package.read_text().replace('"version": "0.11.4"', '"version": "0.11.5"'))

          for name in ['README.md', 'docs/architecture-current.md', 'docs/current-state.md']:
              path = Path(name)
              if path.exists():
                  path.write_text(path.read_text().replace('0.11.4', '0.11.5'))

          current = Path('docs/current-state.md')
          text = current.read_text()
          marker = '## 0.11.5 Runtime entry sampling fix\n'
          if marker not in text:
              text += ('\n' + marker + '\n'
                       '- Runtime DOM sampling counts only top-level `details.module-card` entries.\n'
                       '- Command buttons carrying `data-module-id` are excluded from duplicate-entry detection.\n'
                       '- This fixes the 0.11.4 false `runtime_duplicate_entries` warning without changing module roles or Runtime state.\n')
              current.write_text(text)
          PY
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit source, tests and generated release
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/ui/app.js src/core/constants.js tests/dcf-module-visibility.unit.test.js package.json README.md docs/architecture-current.md docs/current-state.md dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog/index.json catalog/packages
          git commit -m 'Fix Runtime module entry sampling and release 0.11.5'
          git push origin HEAD:fix/runtime-entry-sampling
