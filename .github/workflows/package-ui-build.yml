name: DCF Package UI Build

on:
  push:
    branches:
      - fix/package-management-compact-ui

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/package-management-compact-ui
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply package presentation and compact UI
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          package_manager = r'''\'use strict\';

          const { decodeArtifacts } = require('../core/artifacts');
          const { REQUIRED_PRODUCT_PACKAGES } = require('./standard-packages');

          const LEGACY_PRESENTATION = {
            'dcf.ammo.module': { title: '语言弹药核心', description: '提供语言弹药内容、主入口和低摩擦发射能力。' },
            'dcf.ammo_workbench': { title: '弹药工作台', description: '提供语言弹药的创建、编辑和常用操作。' },
            'dcf.ammo_workspace.unified': { title: '统一弹药工作区', description: '集中浏览、整理和使用语言弹药。' },
            'dcf.language_ammo': { title: '语言弹药', description: '提供旧版语言弹药工作流的兼容能力。' },
            'dcf.ammo_library.dcf_kernel_maintenance': { title: 'DCF 内核维护', description: '提供语言弹药库与内核维护相关操作。' },
            'dcf.block_scanner': { title: '对话块扫描', description: '扫描并识别对话中的 DCF 工件块。' },
            'dcf.capability_gap_probe': { title: '能力缺口探针', description: '检查当前运行能力与预期能力之间的差异。' },
            'dcf.command_runtime_probe': { title: '命令运行探针', description: '检查模块命令在当前 Runtime 中的执行情况。' },
            'dcf.feedback_safety_probe': { title: '草稿保护探针', description: '检查反馈操作与输入框草稿保护是否可靠。' },
            'dcf.kernel_acceptance': { title: '内核验收', description: '执行 DCF 内核关键能力的验收检查。' },
            'dcf.maintenance_feedback': { title: '维护回馈', description: '生成维护流程需要的反馈信息。' },
            'dcf.module_authoring': { title: '模块作者工具', description: '辅助创建、检查和维护 DCF 模块包。' },
            'dcf.runtime_inspector': { title: '运行检查', description: '查看当前 DCF Runtime 的实际运行状态。' },
            'dcf.shell_adjuster': { title: '壳体调节（旧版）', description: '调整 DCF 侧栏的位置和尺寸。' },
            'dcf.standard.shell-adjuster': { title: '壳体调节', description: '调整侧栏宽度、高度、边距和停靠方向。' },
            'dcf.store_probe': { title: '存储探针', description: '检查 DCF 存储读写与状态恢复。' },
            'dcf.ui_siderail_control': { title: '侧栏控制', description: '调整 DCF 侧栏布局与停靠方式。' },
            'dcf.ui_visual_control': { title: '视觉布局控制', description: '调整 DCF 界面的视觉与布局表现。' }
          };

          function firstText(...values) {
            for (const value of values) {
              const text = String(value == null ? '' : value).trim();
              if (text) return text;
            }
            return '';
          }

          function unique(values) {
            return Array.from(new Set((values || []).map((value) => String(value || '').trim()).filter(Boolean)));
          }

          function hasCjk(value) {
            return /[\u3400-\u9fff]/.test(String(value || ''));
          }

          function activePack(entry) {
            const revision = entry && entry.active_revision;
            return entry && entry.revisions && entry.revisions[revision] && entry.revisions[revision].pack || null;
          }

          function modulePresentation(modules, packageId) {
            for (const module of modules) {
              const known = LEGACY_PRESENTATION[String(module && module.id || '')];
              if (known) return known;
            }
            return LEGACY_PRESENTATION[String(packageId || '')] || null;
          }

          function packagePresentation(entry) {
            const pack = activePack(entry) || {};
            const modules = Array.isArray(pack.modules) ? pack.modules : [];
            const contributes = pack.contributes && typeof pack.contributes === 'object' ? pack.contributes : {};
            const surfaces = Array.isArray(contributes.surfaces) ? contributes.surfaces : [];
            const contentTypes = Array.isArray(contributes.content_types) ? contributes.content_types : [];
            const known = modulePresentation(modules, entry && entry.package_id);
            const explicitTitle = firstText(pack.title, pack.display_name, pack.name, pack.label);
            const moduleTitles = unique(modules.map((module) => module && module.title));
            const surfaceTitles = unique(surfaces.map((surface) => surface && surface.title));
            const contentTitles = unique(contentTypes.map((type) => type && type.title));
            let title = '';
            if (hasCjk(explicitTitle)) title = explicitTitle;
            else if (known) title = known.title;
            else if (moduleTitles.some(hasCjk)) title = moduleTitles.find(hasCjk);
            else if (surfaceTitles.some(hasCjk)) title = surfaceTitles.find(hasCjk);
            else if (contentTitles.some(hasCjk)) title = contentTitles.find(hasCjk);
            else if (modules.length) title = modules.some((module) => module && module.kind === 'ammo') ? '语言弹药功能包' : 'DCF 功能模块包';
            else if (surfaces.length) title = '界面入口扩展包';
            else if (contentTypes.length) title = '内容类型扩展包';
            else if (contributes.appearance) title = '界面外观扩展包';
            else title = 'DCF 扩展包';

            const explicitDescription = firstText(pack.description, pack.summary, pack.purpose);
            const moduleDescriptions = unique(modules.map((module) => firstText(module && module.description, module && module.summary, module && module.purpose)));
            const blockTitles = unique(modules.flatMap((module) => Array.isArray(module && module.blocks) ? module.blocks.map((block) => block && block.title) : []));
            const commandLabels = unique(modules.flatMap((module) => {
              const direct = Array.isArray(module && module.commands) ? module.commands : [];
              const blocked = Array.isArray(module && module.blocks) ? module.blocks.flatMap((block) => Array.isArray(block && block.commands) ? block.commands : []) : [];
              return direct.concat(blocked).map((command) => command && (command.label || command.title));
            }));
            let description = '';
            if (hasCjk(explicitDescription)) description = explicitDescription;
            else if (known) description = known.description;
            else if (moduleDescriptions.some(hasCjk)) description = moduleDescriptions.find(hasCjk);
            else if (blockTitles.some(hasCjk)) description = `功能包括：${blockTitles.filter(hasCjk).slice(0, 4).join('、')}。`;
            else if (commandLabels.some(hasCjk)) description = `提供：${commandLabels.filter(hasCjk).slice(0, 4).join('、')}${commandLabels.filter(hasCjk).length > 4 ? '等' : ''}。`;
            else if (moduleTitles.some(hasCjk)) description = `包含：${moduleTitles.filter(hasCjk).slice(0, 3).join('、')}。`;
            else if (surfaceTitles.some(hasCjk)) description = `提供「${surfaceTitles.filter(hasCjk).slice(0, 2).join('、')}」界面入口。`;
            else if (contentTitles.some(hasCjk)) description = `提供「${contentTitles.filter(hasCjk).slice(0, 2).join('、')}」内容类型。`;
            else description = '提供 DCF 的扩展功能；英文 ID 保留为技术标识。';

            return { title, description };
          }

          function createPackageManager(engine, catalog) {
            function packages() {
              return Object.values(engine.getRoot().packages.packages || {}).sort((a, b) => {
                const left = packagePresentation(a).title;
                const right = packagePresentation(b).title;
                return left.localeCompare(right, 'zh-CN') || String(a.package_id).localeCompare(String(b.package_id));
              });
            }
            function installJson(text) {
              const parsed = JSON.parse(String(text || '{}'));
              const wrapper = `<<<DCF_MODULE_PACK\n${JSON.stringify(parsed)}\nDCF_MODULE_PACK>>>`;
              const decoded = decodeArtifacts(wrapper);
              if (decoded.errors.length || decoded.artifacts.length !== 1) throw new Error(decoded.errors[0] && decoded.errors[0].error || 'invalid package');
              return engine.applyArtifact(decoded.artifacts[0], { kind: 'manual-json' });
            }
            function assertMutable(id) {
              if (REQUIRED_PRODUCT_PACKAGES.includes(String(id))) throw new Error(`${id} is required by the DCF product value loop`);
            }
            return {
              packages,
              presentation: packagePresentation,
              installJson,
              setEnabled: (id, enabled) => { if (!enabled) assertMutable(id); return engine.setPackageEnabled(id, enabled); },
              uninstall: (id) => { assertMutable(id); return engine.uninstallPackage(id); },
              switchRevision: (id, revision) => engine.switchPackageRevision(id, revision),
              checkUpdates: (force) => catalog.check({ force: !!force }),
              isRequired: (id) => REQUIRED_PRODUCT_PACKAGES.includes(String(id))
            };
          }

          module.exports = { createPackageManager, packagePresentation, activePack, LEGACY_PRESENTATION };
          '''
          Path('src/modules/package-manager.js').write_text(package_manager)

          app_path = Path('src/ui/app.js')
          app = app_path.read_text()
          old_controls = "textarea,input,select{width:100%;box-sizing:border-box;border:1px solid #9995;border-radius:9px;background:#fff8;color:inherit;padding:7px}textarea{min-height:120px}"
          new_controls = "textarea,input{width:100%;box-sizing:border-box;border:1px solid #9995;border-radius:9px;background:#fff8;color:inherit;padding:7px}select{box-sizing:border-box;border:1px solid #9995;border-radius:9px;background:#fff8;color:inherit;padding:6px}textarea{min-height:120px}"
          if old_controls not in app:
            raise SystemExit('global form control CSS anchor missing')
          app = app.replace(old_controls, new_controls)
          css_anchor = ".health-count{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;margin-top:6px}"
          css_addition = css_anchor + ".package-toolbar{padding:8px}.package-toolbar>.row{align-items:flex-start}.package-toolbar>.row>button{white-space:nowrap}.package-install{margin-top:7px;border-top:1px solid #9993}.package-install>summary{cursor:pointer;padding-top:7px;font-size:11px;opacity:.75}.package-install>.detail-body{padding-top:7px}.package-list{padding:0 9px}.package-card{padding:8px 0;border-bottom:1px solid #9993}.package-card:last-child{border-bottom:0}.package-title-row{display:flex;align-items:center;gap:6px}.package-title-row .name{flex:1;min-width:0}.package-description{font-size:11px;line-height:1.35;opacity:.78;margin-top:2px}.package-id{margin-top:2px}.package-controls{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:6px}.package-controls select{width:auto;min-width:72px;max-width:118px;padding:4px 22px 4px 6px}.package-controls button{padding:4px 7px}.package-version{font:11px ui-monospace,SFMono-Regular,Menlo,monospace;padding:4px 6px;border:1px solid #9994;border-radius:8px}.state-pill.enabled{border-color:#16a34a66}.state-pill.disabled{border-color:#d9770666}.state-pill.required{border-color:#7c3aed66}"
          if css_anchor not in app:
            raise SystemExit('package CSS anchor missing')
          app = app.replace(css_anchor, css_addition)

          replacement = r'''  function renderPackages() {
            const entries = packageManager.packages();
            body.innerHTML = `<div class="card package-toolbar"><div class="row"><span class="grow"><span class="name">安装包管理</span><br><span class="mini">中文名称和功能说明用于日常识别；英文 ID 仅保留为技术标识。</span></span><button data-action="package-update">检查更新</button></div><details class="package-install"><summary>手动安装包</summary><div class="detail-body"><textarea data-role="package-json" placeholder="粘贴 DCF_MODULE_PACK JSON">${escapeHtml(packageDraft)}</textarea><div class="actions"><button data-action="package-install">安装 JSON</button></div></div></details></div><section class="card package-list" data-runtime-section="packages">` + entries.map((entry) => {
              const revisions = Object.keys(entry.revisions || {}).sort();
              const required = packageManager.isRequired(entry.package_id);
              const presentation = packageManager.presentation(entry);
              const enabled = entry.enabled !== false;
              const stateClass = required ? 'required' : enabled ? 'enabled' : 'disabled';
              const stateLabel = required ? '核心' : enabled ? '已启用' : '已停用';
              const revisionControl = revisions.length > 1
                ? `<select aria-label="选择版本" data-role="package-revision" data-id="${escapeHtml(entry.package_id)}">${revisions.map((revision) => `<option ${revision === entry.active_revision ? 'selected' : ''}>${escapeHtml(revision)}</option>`).join('')}</select><button data-action="package-switch" data-id="${escapeHtml(entry.package_id)}">切换</button>`
                : `<span class="package-version">v${escapeHtml(entry.active_revision)}</span>`;
              return `<div class="package-card" data-package-id="${escapeHtml(entry.package_id)}"><div class="package-title-row"><span class="name">${escapeHtml(presentation.title)}</span><span class="state-pill ${stateClass}">${stateLabel}</span></div><div class="package-description">${escapeHtml(presentation.description)}</div><div class="mini package-id">${escapeHtml(entry.package_id)}</div><div class="package-controls">${revisionControl}${required ? '' : `<button data-action="package-toggle" data-id="${escapeHtml(entry.package_id)}">${enabled ? '停用' : '启用'}</button><button data-action="package-uninstall" data-id="${escapeHtml(entry.package_id)}" class="danger">卸载</button>`}</div></div>`;
            }).join('') + '</section>';
          }

          '''
          pattern = re.compile(r"  function renderPackages\(\) \{.*?\n  \}\n\n(?=  function renderMaintenance\(\))", re.S)
          if not pattern.search(app):
            raise SystemExit('renderPackages block missing')
          app = pattern.sub(replacement, app, count=1)
          app_path.write_text(app)

          test = r'''\'use strict\';

          const assert = require('assert');
          const fs = require('fs');
          const path = require('path');
          const { packagePresentation } = require('../src/modules/package-manager');

          function entry(pack) {
            return {
              package_id: pack.pack_id,
              active_revision: pack.revision,
              enabled: true,
              revisions: { [pack.revision]: { pack } }
            };
          }

          let view = packagePresentation(entry({
            schema: 'dcf.module_pack.v1',
            pack_id: 'example.explicit',
            revision: '1',
            title: '示例功能包',
            description: '用于验证显式中文包信息。',
            modules: []
          }));
          assert.deepStrictEqual(view, { title: '示例功能包', description: '用于验证显式中文包信息。' });

          view = packagePresentation(entry({
            schema: 'dcf.module_pack.v1',
            pack_id: 'dcf.runtime_inspector',
            revision: '1',
            modules: [{ id: 'dcf.runtime_inspector', title: 'Runtime Inspector', commands: [] }]
          }));
          assert.strictEqual(view.title, '运行检查');
          assert(view.description.includes('Runtime'));

          view = packagePresentation(entry({
            schema: 'dcf.module_pack.v1',
            pack_id: 'dcf.surface.example',
            revision: '1',
            contributes: { surfaces: [{ id: 'example', title: '示例入口' }] },
            modules: []
          }));
          assert.strictEqual(view.title, '示例入口');
          assert(view.description.includes('界面入口'));

          const appSource = fs.readFileSync(path.join(__dirname, '..', 'src', 'ui', 'app.js'), 'utf8');
          assert(appSource.includes('packageManager.presentation(entry)'), 'package cards do not use the presentation model');
          assert(appSource.includes('class="card package-list"'), 'packages are not rendered as one compact list');
          assert(appSource.includes('class="package-controls"'), 'package operations do not share one compact control band');
          assert(appSource.includes('.package-controls select{width:auto'), 'package revision selector still consumes the full card width');
          assert(appSource.includes('<details class="package-install">'), 'low-frequency manual installation input is not folded');
          assert(!appSource.includes('<div class="name">${escapeHtml(entry.package_id)}'), 'technical package ID is still used as the primary title');

          console.log(JSON.stringify({ ok: true, localized_package_titles: true, derived_descriptions: true, compact_controls: true, folded_manual_install: true }, null, 2));
          '''
          Path('tests/dcf-package-management-ui.unit.test.js').write_text(test)

          package_json = Path('package.json')
          text = package_json.read_text().replace('"version": "0.11.5"', '"version": "0.11.6"')
          anchor = 'node tests/dcf-module-visibility.unit.test.js && '
          if anchor not in text:
            raise SystemExit('package test anchor missing')
          text = text.replace(anchor, anchor + 'node tests/dcf-package-management-ui.unit.test.js && ')
          package_json.write_text(text)

          constants = Path('src/core/constants.js')
          constants.write_text(constants.read_text().replace("const VERSION = '0.11.5';", "const VERSION = '0.11.6';"))

          for name in ['README.md', 'docs/architecture-current.md', 'docs/current-state.md']:
            path = Path(name)
            text = path.read_text().replace('0.11.5', '0.11.6')
            path.write_text(text)

          current = Path('docs/current-state.md')
          text = current.read_text()
          marker = '## 0.11.6 包管理可读性与紧凑布局\n'
          if marker not in text:
            text += ('\n' + marker + '\n'
                     '- 包卡片以中文名称和一句功能说明为主，英文 package ID 降为次要技术标识。\n'
                     '- 现有旧包优先从包元数据、模块标题、Surface、内容类型和兼容展示表生成中文说明。\n'
                     '- 单版本包只显示紧凑版本标签；多版本包才显示版本选择与切换。\n'
                     '- 版本、切换、启停和卸载集中在同一操作带，版本选择器不再独占整行。\n'
                     '- 手动安装 JSON 折叠为低频入口，包总览成为页面主体。\n')
            current.write_text(text)
          PY
      - run: npm run verify
      - run: node --check dcf-chatgpt-microcore.user.js
      - name: Commit source, tests and generated release
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/modules/package-manager.js src/ui/app.js src/core/constants.js tests/dcf-package-management-ui.unit.test.js package.json README.md docs/architecture-current.md docs/current-state.md dcf-chatgpt-microcore.user.js dcf-chatgpt-microcore.meta.js catalog/index.json catalog/packages
          git commit -m 'Localize and compact package management UI for 0.11.6'
          git push origin HEAD:fix/package-management-compact-ui
